# shortlink を再デプロイをまたいで永続化するには、Railway Volume をアタッチし、
# その mount path を FULGUR_SHORTLINK_DIR に設定すること（例: mount=/data,
# FULGUR_SHORTLINK_DIR=/data）。Volume 無しでも既定 dir (./fulgur-shortlinks) に
# 書いて起動はするが、Railway の FS は ephemeral なので再デプロイで消える。
# nonroot で実行する構成（Docker image をそのままデプロイする等）で Volume への
# 書き込みが権限エラーになる場合は、Railway が Volume を root マウントするため
# RAILWAY_RUN_UID=0 も設定する（この場合プロセスは root で起動する）。
[deploy]
startCommand = "./target/release/chart-server"
healthcheckPath = "/health"
healthcheckTimeout = 10
