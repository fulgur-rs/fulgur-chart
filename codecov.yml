# Codecov configuration — https://docs.codecov.com/docs/codecov-yaml
coverage:
  status:
    # Start non-blocking: report coverage without failing PRs while a baseline
    # is established. Flip `informational` to false once the numbers settle.
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        informational: true

# The root workspace already excludes crates/bindings, but keep generated and
# non-product code out of the report explicitly.
ignore:
  - "crates/bindings"
  - "**/tests"
  - "examples"
  - "tools"

comment:
  layout: "reach, diff, files"
  require_changes: true
