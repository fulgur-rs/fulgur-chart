name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

  musl:
    name: Test (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            use_cross: false
          - target: aarch64-unknown-linux-musl
            use_cross: true
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.use_cross == false
        run: sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@cross

      - name: Test (native musl)
        if: matrix.use_cross == false
        run: cargo test --workspace --locked --target ${{ matrix.target }}

      - name: Test (cross)
        if: matrix.use_cross == true
        run: cross test --workspace --locked --target ${{ matrix.target }}

  wasm:
    name: Check (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32

      - name: Check
        run: cargo check --workspace --locked --target wasm32-unknown-unknown

  msrv:
    name: MSRV (1.85.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.85.0

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace --locked

  ruby-binding:
    name: Ruby binding (build + smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/bindings/ruby
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/bindings/ruby
          key: ruby-binding

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          working-directory: crates/bindings/ruby

      # The native ext crate is excluded from the root workspace, so the root fmt/clippy
      # jobs don't cover it — gate it here.
      - name: Format check (ext)
        run: cargo fmt --manifest-path ext/fulgur_chart/Cargo.toml -- --check

      - name: Clippy (ext)
        # No --locked: the ext crate's Cargo.lock is gitignored (the path-dependent core version
        # is bumped by release-plz each release), so let cargo resolve the lock here.
        run: cargo clippy --manifest-path ext/fulgur_chart/Cargo.toml --all-targets -- -D warnings

      - name: Install gems
        run: bundle install

      - name: Compile + test
        run: bundle exec rake

  python-binding:
    name: Python binding (build + smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/bindings/python
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/bindings/python
          key: python-binding

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Format check
        run: cargo fmt --manifest-path Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path Cargo.toml --all-targets -- -D warnings

      - name: Create venv + install maturin/pytest
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -U pip
          .venv/bin/python -m pip install maturin pytest

      - name: Build (maturin develop)
        run: .venv/bin/maturin develop

      - name: Test
        run: .venv/bin/pytest tests/
