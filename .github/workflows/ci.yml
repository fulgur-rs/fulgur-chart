name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC auth for the Codecov upload (no static token)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: coverage

      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-llvm-cov

      # Covers the root workspace only (crates/bindings is excluded from the
      # workspace); the thin native wrappers aren't worth the instrumentation cost.
      - name: Generate coverage (lcov)
        run: cargo llvm-cov --workspace --locked --lcov --output-path lcov.info

      # No static CODECOV_TOKEN: authenticate the upload via GitHub OIDC instead
      # (codecov-action auto-skips OIDC on fork PRs, which can't mint id-tokens).
      # fail_ci_if_error stays false so a Codecov rate-limit/upload hiccup doesn't
      # fail the build.
      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          files: lcov.info
          fail_ci_if_error: false

  musl:
    name: Test (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            use_cross: false
          - target: aarch64-unknown-linux-musl
            use_cross: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.use_cross == false
        run: sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cross

      - name: Test (native musl)
        if: matrix.use_cross == false
        run: cargo test --workspace --locked --target ${{ matrix.target }}

      - name: Test (cross)
        if: matrix.use_cross == true
        run: cross test --workspace --locked --target ${{ matrix.target }}

  wasm:
    name: Check + runtime test (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: wasm32

      - name: Check
        run: cargo check --workspace --locked --target wasm32-unknown-unknown --exclude chart-server

      # wasm32 でビルドが通るだけでなく、実際に SVG/PNG を生成して native と
      # byte 一致する(決定論が cross-platform で保たれる)ことを node 上で検証する。
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: wasm-pack

      - name: Runtime byte-equality test (node)
        run: wasm-pack test --node crates/fulgur-chart --test wasm_runtime

  msrv:
    name: MSRV (1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@193d6aa1dbbc28bd2c0a6b0e327cfdce68baaf6e # 1.89.0
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check
        run: cargo check --workspace --locked

  ruby-binding:
    name: Ruby binding (build + smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/bindings/ruby
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: crates/bindings/ruby
          key: ruby-binding

      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: "3.3"
          working-directory: crates/bindings/ruby

      # The native ext crate is excluded from the root workspace, so the root fmt/clippy
      # jobs don't cover it — gate it here.
      - name: Format check (ext)
        run: cargo fmt --manifest-path ext/fulgur_chart/Cargo.toml -- --check

      - name: Clippy (ext)
        # No --locked: the ext crate's Cargo.lock is gitignored (the path-dependent core version
        # is bumped by release-plz each release), so let cargo resolve the lock here.
        run: cargo clippy --manifest-path ext/fulgur_chart/Cargo.toml --all-targets -- -D warnings

      - name: Install gems
        run: bundle install

      - name: Compile + test
        run: bundle exec rake

  python-binding:
    name: Python binding (build + smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/bindings/python
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: crates/bindings/python
          key: python-binding

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Format check
        run: cargo fmt --manifest-path Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path Cargo.toml --all-targets -- -D warnings

      - name: Create venv + install maturin/pytest
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -U pip
          .venv/bin/python -m pip install maturin pytest

      - name: Build (maturin develop)
        run: .venv/bin/maturin develop

      - name: Test
        run: .venv/bin/pytest tests/

  node-binding:
    name: Node.js binding (build + smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/bindings/node
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: crates/bindings/node
          key: node-binding

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      # The native crate is excluded from the root workspace, so the root fmt/clippy
      # jobs don't cover it — gate it here. No --locked: the crate's Cargo.lock is
      # gitignored (the path-dependent core version is bumped by release-plz each release),
      # so let cargo resolve the lock here.
      - name: Format check
        run: cargo fmt --manifest-path Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path Cargo.toml --all-targets -- -D warnings

      - name: Install npm deps
        run: npm install

      - name: Build native addon
        run: npm run build

      - name: Typecheck (index.d.ts)
        run: npm run typecheck

      - name: Test
        run: npm test

  chart-cli:
    name: Chart CLI launcher (build + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: chart-cli

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Build fulgur-chart binary (linux-x64)
        run: cargo build --release -p fulgur-chart-cli

      - name: Stage binary for launcher
        run: |
          mkdir -p packages/npm/chart-cli-linux-x64/bin
          cp target/release/fulgur-chart packages/npm/chart-cli-linux-x64/bin/fulgur-chart

      - name: Link platform package into meta package
        run: |
          mkdir -p packages/npm/chart-cli/node_modules/@fulgur-rs
          ln -s ../../../chart-cli-linux-x64 packages/npm/chart-cli/node_modules/@fulgur-rs/chart-cli-linux-x64

      - name: Run launcher unit tests
        working-directory: packages/npm/chart-cli
        run: node --test

      - name: Smoke test npx execution
        run: |
          npx ./packages/npm/chart-cli render examples/specs/bar.json -o /tmp/chart-cli-smoke.svg
          test "$(head -c 4 /tmp/chart-cli-smoke.svg)" = "<svg"

      - name: Verify output matches native CLI
        run: |
          cargo run --release -p fulgur-chart-cli -- render examples/specs/bar.json -o /tmp/chart-cli-native.svg
          diff /tmp/chart-cli-smoke.svg /tmp/chart-cli-native.svg

  wasm-binding:
    name: WASM binding (build + smoke)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: crates/bindings/wasm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: crates/bindings/wasm
          key: wasm-binding

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: wasm-pack

      # The committed Cargo.lock pins all external registry crates, but the
      # fulgur-chart path dependency is version-bumped by release-plz each
      # release, so on a release PR the lock is stale and every --locked cargo
      # command below (and `wasm-pack build --locked` via `npm run build`) would
      # fail with "cannot update the lock file because --locked was passed".
      # Reconcile ONLY that path-dependency entry, then assert no registry crate
      # drifted from the committed lock (checksum set must be unchanged) so CI
      # keeps testing the exact pinned versions that get published.
      - name: Reconcile fulgur-chart path dependency in Cargo.lock
        run: |
          before="$(grep '^checksum = ' Cargo.lock | sort)"
          cargo update -p fulgur-chart
          after="$(grep '^checksum = ' Cargo.lock | sort)"
          if [ "$before" != "$after" ]; then
            echo "ERROR: reconciling fulgur-chart drifted registry crates from the committed Cargo.lock." >&2
            echo "Update crates/bindings/wasm/Cargo.lock in a reviewed commit instead." >&2
            diff <(printf '%s\n' "$before") <(printf '%s\n' "$after") >&2 || true
            exit 1
          fi

      # The native crate is excluded from the root workspace, so the root fmt/clippy
      # jobs don't cover it — gate it here. --locked everywhere (the reconcile step
      # above keeps the committed lock consistent) so CI exercises the pinned deps.
      - name: Format check
        run: cargo fmt --manifest-path Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path Cargo.toml --target wasm32-unknown-unknown --all-targets --locked -- -D warnings

      - name: Install npm deps
        run: npm install

      - name: Build wasm package
        run: npm run build

      - name: Typecheck (index.d.ts)
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser smoke test (Chromium headless)
        run: npm run test:browser

  perf:
    name: Perf (memory gate + speed report)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: perf

      # Deterministic dhat allocation gate: fails on extreme memory regressions.
      - name: Memory regression gate (dhat)
        run: cargo bench -p fulgur-chart --bench membench --features dhat-heap --locked -- --check

      # Speed benchmarks are informational only (wall-clock is noisy on shared
      # runners), so this never gates — we just run and archive the numbers.
      # continue-on-error keeps a flaky/non-zero bench run from failing the job;
      # compile errors in render.rs are still caught by the Test/clippy jobs
      # (--all-targets, and `render` has no required-features).
      - name: Render speed benchmark (report-only)
        continue-on-error: true
        run: cargo bench -p fulgur-chart --bench render --locked

      - name: Upload criterion report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: criterion-report
          path: target/criterion
          if-no-files-found: ignore
