name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage

      - uses: taiki-e/install-action@cargo-llvm-cov

      # Covers the root workspace only (crates/bindings is excluded from the
      # workspace); the thin native wrappers aren't worth the instrumentation cost.
      - name: Generate coverage (lcov)
        run: cargo llvm-cov --workspace --locked --lcov --output-path lcov.info

      # Tokenless upload (public repo). fail_ci_if_error stays false so a Codecov
      # rate-limit/upload hiccup doesn't fail the build.
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false

  musl:
    name: Test (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            use_cross: false
          - target: aarch64-unknown-linux-musl
            use_cross: true
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.use_cross == false
        run: sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@cross

      - name: Test (native musl)
        if: matrix.use_cross == false
        run: cargo test --workspace --locked --target ${{ matrix.target }}

      - name: Test (cross)
        if: matrix.use_cross == true
        run: cross test --workspace --locked --target ${{ matrix.target }}

  wasm:
    name: Check + runtime test (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32

      - name: Check
        run: cargo check --workspace --locked --target wasm32-unknown-unknown

      # wasm32 でビルドが通るだけでなく、実際に SVG/PNG を生成して native と
      # byte 一致する(決定論が cross-platform で保たれる)ことを node 上で検証する。
      - uses: taiki-e/install-action@wasm-pack

      - name: Runtime byte-equality test (node)
        run: wasm-pack test --node crates/fulgur-chart --test wasm_runtime

  msrv:
    name: MSRV (1.85.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.85.0

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace --locked

  ruby-binding:
    name: Ruby binding (build + smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/bindings/ruby
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/bindings/ruby
          key: ruby-binding

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          working-directory: crates/bindings/ruby

      # The native ext crate is excluded from the root workspace, so the root fmt/clippy
      # jobs don't cover it — gate it here.
      - name: Format check (ext)
        run: cargo fmt --manifest-path ext/fulgur_chart/Cargo.toml -- --check

      - name: Clippy (ext)
        # No --locked: the ext crate's Cargo.lock is gitignored (the path-dependent core version
        # is bumped by release-plz each release), so let cargo resolve the lock here.
        run: cargo clippy --manifest-path ext/fulgur_chart/Cargo.toml --all-targets -- -D warnings

      - name: Install gems
        run: bundle install

      - name: Compile + test
        run: bundle exec rake

  python-binding:
    name: Python binding (build + smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/bindings/python
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/bindings/python
          key: python-binding

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Format check
        run: cargo fmt --manifest-path Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path Cargo.toml --all-targets -- -D warnings

      - name: Create venv + install maturin/pytest
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -U pip
          .venv/bin/python -m pip install maturin pytest

      - name: Build (maturin develop)
        run: .venv/bin/maturin develop

      - name: Test
        run: .venv/bin/pytest tests/

  node-binding:
    name: Node.js binding (build + smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/bindings/node
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/bindings/node
          key: node-binding

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The native crate is excluded from the root workspace, so the root fmt/clippy
      # jobs don't cover it — gate it here. No --locked: the crate's Cargo.lock is
      # gitignored (the path-dependent core version is bumped by release-plz each release),
      # so let cargo resolve the lock here.
      - name: Format check
        run: cargo fmt --manifest-path Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path Cargo.toml --all-targets -- -D warnings

      - name: Install npm deps
        run: npm install

      - name: Build native addon
        run: npm run build

      - name: Typecheck (index.d.ts)
        run: npm run typecheck

      - name: Test
        run: npm test
