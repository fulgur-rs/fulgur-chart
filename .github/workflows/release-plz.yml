name: Release-plz

# crates.io への publish を release-plz で自動化する。
# - release-plz-pr:      バージョン更新 + CHANGELOG を載せたリリース PR を作成/更新
# - release-plz-release: PR がマージされた版を crates.io へ publish + git タグ + GitHub Release
#
# 認証は Trusted Publishing (OIDC) を使う。長期トークンは保持しない。
# 初回セットアップ手順は docs/releasing.md を参照。

permissions:
  contents: read

on:
  push:
    branches:
      - main
  # リリース PR が通らなかった場合の手動 escape hatch。
  # main から実行した場合のみ approve なしで即 publish できる。
  # main 以外の ref で実行しても publish は skip する(未マージ code の publish 防止)。
  workflow_dispatch:

jobs:
  # release-plz PR のマージかどうかを判定する (approve 不要)。
  # - merge commit message に "release-plz-YYYY-MM-DD" が含まれる → リリース PR マージ
  # - merge commit message に "chore: release" が含まれる → squash-merge 時のフォールバック
  # - workflow_dispatch かつ main ref → 手動実行なので publish (main 以外の ref は skip)
  #
  # NOTE: このチェックはマージコミット方式に依存している。
  # リリース PR を squash-merge に変更する場合は "chore: release" フォールバックが機能するか確認すること。
  check-releases:
    name: Check for releases
    runs-on: ubuntu-latest
    outputs:
      has_releases: ${{ steps.check.outputs.has_releases }}
    steps:
      - name: Determine if this push includes a release
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          EVENT_NAME: ${{ github.event_name }}
          GIT_REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # 手動実行(escape hatch)は main からのみ publish を許可する。feature や
            # stale な release ブランチから実行して main 未マージの code が
            # publish されるのを防ぐ。
            if [ "$GIT_REF" = "refs/heads/main" ]; then
              echo "has_releases=true" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::workflow_dispatch on non-main ref ($GIT_REF); skipping release"
              echo "has_releases=false" >> "$GITHUB_OUTPUT"
            fi
          elif echo "$COMMIT_MSG" | grep -qE "release-plz-[0-9]{4}-[0-9]{2}"; then
            echo "has_releases=true" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | grep -q "chore: release"; then
            echo "has_releases=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_releases=false" >> "$GITHUB_OUTPUT"
          fi

  # 公開可能なバージョンを crates.io へ publish し、git タグと GitHub Release を作成する。
  # release-plz PR がマージされたときだけ実行される (environment approve が必要)。
  release-plz-release:
    name: Release-plz release
    needs: check-releases
    # 二重防御: check-releases に加え、publish ジョブ自体も main ref に限定する。
    if: needs.check-releases.outputs.has_releases == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: write
      id-token: write # crates.io Trusted Publishing (OIDC) 用
    steps:
      # GITHUB_TOKEN だと release イベントが発火せず後続ワークフローが動かないため App トークンを使う。
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
          permission-contents: write # 最小権限: タグ / Release 作成に必要

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # CHANGELOG 生成に全履歴が必要
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # OIDC で crates.io から 30 分の短命トークンを取得する。
      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # バージョン更新 + CHANGELOG を載せたリリース PR を作成/更新する。
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # 連続 push で複数 PR ジョブが衝突しないよう直列化する。
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
          permission-contents: write # 最小権限: バージョン更新 commit / branch に必要
          permission-pull-requests: write # 最小権限: リリース PR の作成 / 更新に必要

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
