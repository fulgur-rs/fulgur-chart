# @fulgur-rs/chart-node および @fulgur-rs/chart-wasm の npm への自動配布。
# release-plz が fulgur-chart-v* タグを含む GitHub Release を publish したときに起動する。
# OIDC Trusted Publishing を使用するため npm トークン不要。
#
# 手動セットアップ (一度だけ):
#   npm の各パッケージに Trusted Publisher を登録する。
#   Owner: fulgur-rs, Repo: fulgur-chart, Workflow: node-npm-release.yml, Environment: npm
#
# 配布するパッケージ (8つ):
#   @fulgur-rs/chart-node-linux-x64-gnu
#   @fulgur-rs/chart-node-linux-x64-musl
#   @fulgur-rs/chart-node-linux-arm64-gnu
#   @fulgur-rs/chart-node-darwin-arm64
#   @fulgur-rs/chart-node-darwin-x64
#   @fulgur-rs/chart-node-win32-x64-msvc
#   @fulgur-rs/chart-node (loader + JS wrapper)
#   @fulgur-rs/chart-wasm (WebAssembly)

name: Node.js / WASM NPM Release

on:
  release:
    types: [published]

jobs:
  validate-release-tag:
    name: Validate release tag
    if: startsWith(github.ref_name, 'fulgur-chart-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.validate.outputs.tag }}
      sha: ${{ steps.validate.outputs.sha }}
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Validate immutable release tag
        id: validate
        env:
          REQUESTED_TAG: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
        run: |
          set -euo pipefail

          tag="$REQUESTED_TAG"

          # 1. Strict SemVer under the fulgur-chart-v prefix.
          semver_re='^fulgur-chart-v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          if [[ ! "$tag" =~ $semver_re ]]; then
            echo "Invalid release tag (expected fulgur-chart-v<strict-semver>): '$tag'" >&2
            exit 1
          fi

          # 2. Workflow must run from the tag itself.
          if [[ "$REF_TYPE" != "tag" || "$REF_NAME" != "$tag" ]]; then
            echo "Workflow must run from the release tag (ref_type=$REF_TYPE ref_name=$REF_NAME tag=$tag)." >&2
            exit 1
          fi

          # 3. Refuse if a branch with the same name exists (branch-shadow attack).
          branch_match="$(git ls-remote --heads "$REPO_URL" "refs/heads/$tag" \
            | awk -v ref="refs/heads/$tag" '$2 == ref { print $1 }')"
          if [[ -n "$branch_match" ]]; then
            echo "Refusing ambiguous release ref: branch '$tag' exists." >&2
            exit 1
          fi

          # 4. Resolve to immutable commit SHA.
          tag_refs="$(git ls-remote "$REPO_URL" "refs/tags/$tag" "refs/tags/$tag^{}")"
          sha="$(awk '$2 ~ /\^\{\}$/ { print $1 }' <<< "$tag_refs")"
          if [[ -z "$sha" ]]; then
            sha="$(awk -v ref="refs/tags/$tag" '$2 == ref { print $1 }' <<< "$tag_refs")"
          fi
          if [[ -z "$sha" ]]; then
            echo "Tag '$tag' does not exist on origin." >&2
            exit 1
          fi

          echo "Resolved $tag -> $sha"
          {
            echo "tag=$tag"
            echo "sha=$sha"
            echo "version=${tag#fulgur-chart-v}"
          } >> "$GITHUB_OUTPUT"

  build-native:
    name: Build ${{ matrix.settings.target }}
    needs: validate-release-tag
    runs-on: ${{ matrix.settings.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        settings:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use-cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    defaults:
      run:
        working-directory: crates/bindings/node
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate-release-tag.outputs.sha }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/bindings/node
          key: ${{ matrix.settings.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install npm deps
        run: npm install

      # musl / aarch64-gnu are cross-compiled on the host via cargo-zigbuild
      # (napi `--cross-compile`), NOT via cross's Docker. cross only mounts this
      # standalone node workspace plus the `fulgur-chart` path dependency — it does
      # NOT mount the repo-root Cargo.toml that `crates/fulgur-chart` inherits
      # `edition.workspace = true` from, so cross fails with "failed to find a
      # workspace root". zigbuild runs on the host where the full tree is present.
      - name: Setup zig (zigbuild cross-compile toolchain)
        if: matrix.settings.use-cross
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: matrix.settings.use-cross
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Build native addon (cross-compile via zigbuild)
        if: matrix.settings.use-cross
        run: npx napi build --platform --release --strip --target ${{ matrix.settings.target }} --cross-compile

      - name: Build native addon (native)
        if: '!matrix.settings.use-cross'
        run: npx napi build --platform --release --strip --target ${{ matrix.settings.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: crates/bindings/node/*.node
          if-no-files-found: error

  package-npm-tarballs:
    name: Package npm tarballs
    needs: [validate-release-tag, build-native]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: crates/bindings/node
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate-release-tag.outputs.sha }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/bindings/node
          key: package

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Ensure npm supports OIDC trusted publishing (>= 11.5.1)
        run: |
          npm install -g npm@latest
          node --version
          npm --version

      - name: Install npm deps
        run: npm install

      - name: Download all .node artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bindings-*
          path: crates/bindings/node/artifacts/
          merge-multiple: true

      - name: Move artifacts into npm sub-packages
        run: npx napi artifacts --output-dir artifacts/ --npm-dir npm/

      - name: Build binding.js loader (regenerates loader covering all 6 platforms)
        run: npx napi build --platform --release --js binding.js --dts binding.d.ts

      - name: Verify binding.js covers all 6 platforms
        run: |
          count=$(grep -c "chart-node\." binding.js)
          echo "binding.js references $count platform entries"
          if [ "$count" -lt 6 ]; then
            echo "ERROR: expected >= 6 platform entries in binding.js, got $count" >&2
            exit 1
          fi

      - name: Set package version from tag
        env:
          VERSION: ${{ needs.validate-release-tag.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            const main = JSON.parse(fs.readFileSync("package.json", "utf8"));
            main.version = v;
            for (const dep of Object.keys(main.optionalDependencies || {})) {
              main.optionalDependencies[dep] = v;
            }
            fs.writeFileSync("package.json", JSON.stringify(main, null, 2) + "\n");
            const platforms = ["linux-x64-gnu","linux-x64-musl","linux-arm64-gnu","darwin-arm64","darwin-x64","win32-x64-msvc"];
            for (const p of platforms) {
              const path = `npm/${p}/package.json`;
              const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
              pkg.version = v;
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + "\n");
            }
          '

      - name: Pack npm tarballs without lifecycle scripts
        run: |
          mkdir -p packed
          for platform in linux-x64-gnu linux-x64-musl linux-arm64-gnu darwin-arm64 darwin-x64 win32-x64-msvc; do
            npm pack --ignore-scripts --pack-destination packed/ npm/$platform/
          done
          npm pack --ignore-scripts --pack-destination packed/ .

      - name: Upload npm tarballs
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarballs
          path: crates/bindings/node/packed/*.tgz
          if-no-files-found: error

  publish-packages:
    name: Publish npm packages
    needs: [validate-release-tag, package-npm-tarballs]
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@fulgur-rs/chart-node
    permissions:
      contents: read
      id-token: write
    steps:
      # setup-node MUST be >= v6.1.0 for OIDC trusted publishing: older versions
      # write an .npmrc with `always-auth=true` + a placeholder _authToken, which
      # npm uses instead of OIDC (publish 404s). v6.1.0 removed always-auth
      # handling (actions/setup-node#1436). `registry-url` is required so npm
      # engages the OIDC handshake against the registry; do NOT pass a token.
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # npm OIDC trusted publishing requires npm CLI >= 11.5.1. We deliberately
      # do NOT `npm install -g npm@latest` here (that would run unpinned registry
      # code inside the id-token: write boundary). Node 24 bundles npm >= 11.5.1
      # from v24.5.0 onward; setup-node resolves "24" to the latest patch, which
      # satisfies this. Assert it so an unexpectedly old bundled npm fails fast
      # with an actionable message instead of a confusing publish-time 404.
      - name: Enforce npm OIDC minimum (>= 11.5.1)
        run: |
          node --version
          npm_version="$(npm --version)"
          required="11.5.1"
          echo "npm $npm_version (required >= $required)"
          if [ "$(printf '%s\n%s\n' "$required" "$npm_version" | sort -V | head -n1)" != "$required" ]; then
            echo "ERROR: npm $npm_version is below the OIDC trusted publishing floor ($required)." >&2
            echo "Bump node-version in this workflow to a release bundling npm >= $required (Node >= 24.5.0)." >&2
            exit 1
          fi

      - name: Download npm tarballs
        uses: actions/download-artifact@v4
        with:
          name: npm-tarballs
          path: npm-tarballs

      - name: Publish platform packages
        run: |
          for platform in linux-x64-gnu linux-x64-musl linux-arm64-gnu darwin-arm64 darwin-x64 win32-x64-msvc; do
            npm publish --provenance --access public --ignore-scripts npm-tarballs/fulgur-rs-chart-node-$platform-*.tgz
          done

      - name: Publish main package (@fulgur-rs/chart-node)
        run: npm publish --provenance --access public --ignore-scripts npm-tarballs/fulgur-rs-chart-node-[0-9]*.tgz

  build-wasm:
    name: Build WASM npm package
    needs: validate-release-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: crates/bindings/wasm
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate-release-tag.outputs.sha }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/bindings/wasm
          key: wasm-build

      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install npm deps
        run: npm ci

      - name: Set package version from tag
        env:
          VERSION: ${{ needs.validate-release-tag.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.version = v;
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
          '

      # The committed Cargo.lock pins all external registry crates, but the
      # fulgur-chart path dependency is version-bumped by release-plz on every
      # release, leaving the lock stale at release time. Reconcile ONLY that
      # path-dependency entry so `--locked` succeeds while every registry crate
      # stays pinned at its committed version + checksum (scoping to
      # `-p fulgur-chart` prevents an unpinned compatible upgrade of any other
      # crate). This runs in build-wasm, which has no id-token: write.
      - name: Reconcile fulgur-chart path dependency in Cargo.lock
        run: cargo update -p fulgur-chart

      - name: Build WASM package with locked Rust dependencies
        run: npm run build

      - name: Set version in wasm-pack generated pkg/package.json
        env:
          VERSION: ${{ needs.validate-release-tag.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            const pkg = JSON.parse(fs.readFileSync("pkg/package.json", "utf8"));
            pkg.version = v;
            fs.writeFileSync("pkg/package.json", JSON.stringify(pkg, null, 2) + "\n");
          '

      - name: Verify pkg/ was generated
        run: |
          test -f pkg/package.json || { echo "ERROR: pkg/package.json not found" >&2; exit 1; }
          test -f pkg/fulgur_chart_wasm_bg.wasm || { echo "ERROR: .wasm not found in pkg/" >&2; exit 1; }
          echo "pkg/ contents:"
          ls -lh pkg/

      - uses: actions/upload-artifact@v4
        with:
          name: chart-wasm-package
          path: |
            crates/bindings/wasm/package.json
            crates/bindings/wasm/index.js
            crates/bindings/wasm/index.d.ts
            crates/bindings/wasm/pkg/
          if-no-files-found: error

  publish-wasm:
    name: Publish WASM npm package
    needs: [validate-release-tag, build-wasm]
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@fulgur-rs/chart-wasm
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: crates/bindings/wasm
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate-release-tag.outputs.sha }}
          persist-credentials: false

      # setup-node MUST be >= v6.1.0 for OIDC trusted publishing: older versions
      # write an .npmrc with `always-auth=true` + a placeholder _authToken, which
      # npm uses instead of OIDC (publish 404s). v6.1.0 removed always-auth
      # handling (actions/setup-node#1436). `registry-url` is required so npm
      # engages the OIDC handshake against the registry; do NOT pass a token.
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # npm OIDC trusted publishing requires npm CLI >= 11.5.1. We deliberately
      # do NOT `npm install -g npm@latest` here (that would run unpinned registry
      # code inside the id-token: write boundary). Node 24 bundles npm >= 11.5.1
      # from v24.5.0 onward; setup-node resolves "24" to the latest patch, which
      # satisfies this. Assert it so an unexpectedly old bundled npm fails fast
      # with an actionable message instead of a confusing publish-time 404.
      - name: Enforce npm OIDC minimum (>= 11.5.1)
        run: |
          node --version
          npm_version="$(npm --version)"
          required="11.5.1"
          echo "npm $npm_version (required >= $required)"
          if [ "$(printf '%s\n%s\n' "$required" "$npm_version" | sort -V | head -n1)" != "$required" ]; then
            echo "ERROR: npm $npm_version is below the OIDC trusted publishing floor ($required)." >&2
            echo "Bump node-version in this workflow to a release bundling npm >= $required (Node >= 24.5.0)." >&2
            exit 1
          fi

      - name: Download prebuilt WASM package
        uses: actions/download-artifact@v4
        with:
          name: chart-wasm-package
          path: crates/bindings/wasm

      - name: Verify prebuilt package artifact
        run: |
          test -f package.json || { echo "ERROR: package.json not found" >&2; exit 1; }
          test -f index.js || { echo "ERROR: index.js not found" >&2; exit 1; }
          test -f index.d.ts || { echo "ERROR: index.d.ts not found" >&2; exit 1; }
          test -f pkg/package.json || { echo "ERROR: pkg/package.json not found" >&2; exit 1; }
          test -f pkg/fulgur_chart_wasm_bg.wasm || { echo "ERROR: .wasm not found in pkg/" >&2; exit 1; }

      - name: Publish @fulgur-rs/chart-wasm
        run: npm publish --provenance --access public --ignore-scripts
