# Ruby gem の cross-gem プリビルドと RubyGems.org への自動配布。
# release-plz が fulgur-chart-v* タグを含む GitHub Release を publish したときに起動する。
# 認証は Trusted Publishing (OIDC) を使用するため API key は不要。
#
# 手動セットアップ (一度だけ):
#   RubyGems.org で fulgur_chart gem に Trusted Publisher を登録する。
#   Owner: fulgur-rs, Repo: fulgur-chart, Workflow: ruby-gem-release.yml

name: Ruby Gem Release

on:
  release:
    types: [published]

jobs:
  validate-release-tag:
    name: Validate release tag
    if: startsWith(github.ref_name, 'fulgur-chart-v')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Validate SemVer tag
        id: version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#fulgur-chart-v}"
          if [[ ! "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid release tag version: $VERSION" >&2
            exit 1
          fi
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  cross-gem:
    name: Build ${{ matrix.platform }}
    needs: validate-release-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - x86_64-linux
          - aarch64-linux
          - x86_64-darwin
          - arm64-darwin
          - x64-mingw-ucrt

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: refs/tags/${{ needs.validate-release-tag.outputs.tag }}

      - name: Set gem version from tag
        env:
          VERSION: ${{ needs.validate-release-tag.outputs.version }}
        run: |
          sed -i -E "s|^(version = ).*|\1\"$VERSION\"|" \
            crates/bindings/ruby/ext/fulgur_chart/Cargo.toml
          sed -i -E "s|^(fulgur-chart = ).*|\1\"$VERSION\"|" \
            crates/bindings/ruby/ext/fulgur_chart/Cargo.toml

      - uses: oxidize-rb/actions/setup-ruby-and-rust@e5f9a49a7812a078584072f6e3f657ad247c8771 # v1.4.4
        with:
          ruby-version: "3.3"
          bundler-cache: true
          cargo-cache: true
          working-directory: crates/bindings/ruby

      - uses: oxidize-rb/actions/cross-gem@e5f9a49a7812a078584072f6e3f657ad247c8771 # v1.4.4
        id: cross-gem
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: "3.1,3.2,3.3,3.4"
          working-directory: crates/bindings/ruby

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cross-gem-${{ matrix.platform }}
          path: ${{ steps.cross-gem.outputs.gem-path }}

  source-gem:
    name: Build source gem
    needs: validate-release-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: refs/tags/${{ needs.validate-release-tag.outputs.tag }}

      - name: Set gem version from tag
        env:
          VERSION: ${{ needs.validate-release-tag.outputs.version }}
        run: |
          sed -i -E "s|^(version = ).*|\1\"$VERSION\"|" \
            crates/bindings/ruby/ext/fulgur_chart/Cargo.toml
          sed -i -E "s|^(fulgur-chart = ).*|\1\"$VERSION\"|" \
            crates/bindings/ruby/ext/fulgur_chart/Cargo.toml

      - uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # v1.315.0
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: crates/bindings/ruby

      - name: Build source gem
        working-directory: crates/bindings/ruby
        run: gem build fulgur_chart.gemspec

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: source-gem
          path: crates/bindings/ruby/fulgur_chart-*.gem

  push-gem:
    name: Push to RubyGems.org
    needs: [validate-release-tag, cross-gem, source-gem]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: rubygems.org
      url: https://rubygems.org/gems/fulgur_chart

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "*-gem*"
          merge-multiple: true
          path: gems/

      - uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # v1.315.0
        with:
          ruby-version: "3.3"

      - name: Configure RubyGems credentials (Trusted Publishing)
        uses: rubygems/configure-rubygems-credentials@dc5a8d8553e6ee01fc26761a49e99e733d17954a # v2.1.0

      - name: Push all gems
        run: for gem in gems/*.gem; do gem push "$gem"; done
