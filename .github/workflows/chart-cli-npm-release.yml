name: Chart CLI NPM Release
# NOTE: Publishing uses npm Trusted Publishing (OIDC) with provenance â€” no
# long-lived npm token. Requirements:
#   - A Trusted Publisher configured on npm for each @fulgur-rs/chart-cli*
#     package (repo + this workflow filename + the `npm` environment).
#   - npm >= 11.5.1 and Node >= 22.14.0 on the runner (set up below).
#   - The publish job's `id-token: write` permission (set below).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. fulgur-chart-cli-v0.1.9)"
        required: true

jobs:
  validate-release-tag:
    name: Validate release tag
    # Cheap event filter: only this package's tag series belongs to this
    # workflow. Non-matching releases (e.g. core/Ruby fulgur-chart-v*) skip
    # here, which cascades to build/publish via `needs`. The real security
    # gate is this job's body (strict semver / branch-shadow / SHA resolve).
    if: startsWith(github.event.inputs.tag || github.ref_name, 'fulgur-chart-cli-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.validate.outputs.tag }}
      sha: ${{ steps.validate.outputs.sha }}
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Validate immutable release tag
        id: validate
        env:
          REQUESTED_TAG: ${{ github.event.inputs.tag || github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
        run: |
          set -euo pipefail

          tag="$REQUESTED_TAG"

          # 1. Enforce a strict SemVer shape under the required prefix. This is
          #    the ERE form of the semver.org spec: it forbids leading zeros in
          #    numeric identifiers and empty dot-separated prerelease/build
          #    segments (e.g. v01.2.3 and v1.2.3-alpha..1 are rejected).
          semver_re='^fulgur-chart-cli-v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          if [[ ! "$tag" =~ $semver_re ]]; then
            echo "Invalid release tag (expected fulgur-chart-cli-v<strict-semver>): '$tag'" >&2
            exit 1
          fi

          # 2. The workflow must always run from the tag itself â€” release events
          #    and manual dispatch alike. This pins the workflow definition (not
          #    just the built content) to the immutable tag; manual runs must
          #    select the tag as the "Use workflow from" ref.
          if [[ "$REF_TYPE" != "tag" || "$REF_NAME" != "$tag" ]]; then
            echo "Workflow must run from the requested release tag (ref_type=$REF_TYPE ref_name=$REF_NAME tag=$tag)." >&2
            exit 1
          fi

          # 3. Refuse if a branch EXACTLY named like the tag exists: an
          #    unqualified ref would be ambiguous and could resolve to
          #    attacker-controlled branch code. ls-remote patterns glob-match
          #    ref-name tails, so compare the full refname exactly to avoid
          #    false positives like a release/fulgur-chart-cli-v1.2.3 branch.
          branch_match="$(git ls-remote --heads "$REPO_URL" "refs/heads/$tag" \
            | awk -v ref="refs/heads/$tag" '$2 == ref { print $1 }')"
          if [[ -n "$branch_match" ]]; then
            echo "Refusing ambiguous release ref: branch '$tag' exists." >&2
            exit 1
          fi

          # 4. Resolve the tag to an immutable commit SHA (deref annotated tags
          #    via ^{}). No --exit-code: an empty result is reported by the -z
          #    check below, which would be unreachable under 'set -e' otherwise.
          tag_refs="$(git ls-remote "$REPO_URL" "refs/tags/$tag" "refs/tags/$tag^{}")"
          sha="$(awk '$2 ~ /\^\{\}$/ { print $1 }' <<< "$tag_refs")"
          if [[ -z "$sha" ]]; then
            sha="$(awk -v ref="refs/tags/$tag" '$2 == ref { print $1 }' <<< "$tag_refs")"
          fi
          if [[ -z "$sha" ]]; then
            echo "Tag '$tag' does not exist on origin." >&2
            exit 1
          fi

          echo "Resolved $tag -> $sha"
          {
            echo "tag=$tag"
            echo "sha=$sha"
            echo "version=${tag#fulgur-chart-cli-v}"
          } >> "$GITHUB_OUTPUT"

  build-binary:
    name: Build ${{ matrix.platform }}
    needs: validate-release-tag
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - platform: linux-x64-musl
            target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - platform: linux-arm64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - platform: darwin-arm64
            target: aarch64-apple-darwin
            os: macos-latest
          - platform: darwin-x64
            target: x86_64-apple-darwin
            os: macos-latest
          - platform: win32-x64
            target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.validate-release-tag.outputs.sha }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.platform == 'linux-x64-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.platform == 'linux-arm64'
        uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2.82.6
        with:
          tool: cross

      - name: Build binary (native)
        if: matrix.platform != 'linux-arm64'
        run: cargo build --release -p fulgur-chart-cli --target ${{ matrix.target }}

      - name: Build binary (cross)
        if: matrix.platform == 'linux-arm64'
        run: cross build --release -p fulgur-chart-cli --target ${{ matrix.target }}

      - name: Set binary name
        id: binary
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "win32-x64" ]]; then
            echo "name=fulgur-chart.exe" >> "$GITHUB_OUTPUT"
          else
            echo "name=fulgur-chart" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: chart-cli-${{ matrix.platform }}
          path: target/${{ matrix.target }}/release/${{ steps.binary.outputs.name }}

  publish-packages:
    name: Publish npm packages
    needs: [validate-release-tag, build-binary]
    runs-on: ubuntu-latest
    # Defense-in-depth: gate publish behind a GitHub Environment so the npm
    # credential can be an environment secret protected by required reviewers
    # and tag deployment rules (configure in repo Settings â†’ Environments).
    environment:
      name: npm
      url: https://www.npmjs.com/package/@fulgur-rs/chart-cli
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.validate-release-tag.outputs.sha }}
          persist-credentials: false

      # setup-node MUST be >= v6.1.0 for OIDC trusted publishing: older versions
      # write an .npmrc with `always-auth=true` + a placeholder _authToken, which
      # npm uses instead of OIDC (publish 404s). v6.1.0 removed always-auth
      # handling (actions/setup-node#1436). `registry-url` is required so npm
      # engages the OIDC handshake against the registry; do NOT pass a token.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports OIDC trusted publishing (>= 11.5.1)
        run: |
          npm install -g npm@latest
          node --version
          npm --version

      - name: Export validated package version
        env:
          VALIDATED_VERSION: ${{ needs.validate-release-tag.outputs.version }}
        run: echo "VERSION=$VALIDATED_VERSION" >> "$GITHUB_ENV"

      - name: Download all binary artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: chart-cli-*
          path: artifacts/

      - name: Stage platform packages
        run: |
          set -e
          declare -A BINARY_NAMES=(
            [linux-x64]=fulgur-chart
            [linux-x64-musl]=fulgur-chart
            [linux-arm64]=fulgur-chart
            [darwin-arm64]=fulgur-chart
            [darwin-x64]=fulgur-chart
            [win32-x64]=fulgur-chart.exe
          )
          for platform in linux-x64 linux-x64-musl linux-arm64 darwin-arm64 darwin-x64 win32-x64; do
            pkg_dir="packages/npm/chart-cli-${platform}"
            bin_name="${BINARY_NAMES[$platform]}"
            artifact="artifacts/chart-cli-${platform}/${bin_name}"
            mkdir -p "${pkg_dir}/bin"
            cp -f "${artifact}" "${pkg_dir}/bin/${bin_name}"
            chmod +x "${pkg_dir}/bin/${bin_name}" || true
            PKG_DIR="$pkg_dir" node -e 'const fs=require("fs"),path=require("path"); const p=path.join(process.env.PKG_DIR,"package.json"); const pkg=JSON.parse(fs.readFileSync(p,"utf8")); pkg.version=process.env.VERSION; fs.writeFileSync(p,JSON.stringify(pkg,null,2)+"\n");'
          done

      - name: Publish platform packages
        run: |
          set -e
          for platform in linux-x64 linux-x64-musl linux-arm64 darwin-arm64 darwin-x64 win32-x64; do
            npm publish --provenance --access public packages/npm/chart-cli-${platform}
          done

      - name: Update meta package optionalDependencies
        working-directory: packages/npm/chart-cli
        run: |
          node -e 'const fs=require("fs"); const v=process.env.VERSION; const pkg=JSON.parse(fs.readFileSync("package.json","utf8")); pkg.version=v; for(const dep of Object.keys(pkg.optionalDependencies||{})){pkg.optionalDependencies[dep]=v;} fs.writeFileSync("package.json",JSON.stringify(pkg,null,2)+"\n");'

      - name: Publish meta package
        working-directory: packages/npm/chart-cli
        run: npm publish --provenance --access public
