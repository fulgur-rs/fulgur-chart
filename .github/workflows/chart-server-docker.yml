name: chart-server Docker

on:
  push:
    branches: [main]
    tags: ['chart-server-v*']
  pull_request:
    paths:
      - 'crates/chart-server/**'
      - 'crates/fulgur-chart/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/chart-server-docker.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: fulgur-rs/chart-server

jobs:
  # PR validation runs untrusted code (cargo build / build.rs, Docker build)
  # with contents:read only. No packages:write token is ever granted to a
  # PR-triggered run, so build-time code cannot reach a write-capable token.
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-chart-server-${{ hashFiles('**/Cargo.lock') }}

      - name: Build chart-server (static binary)
        run: |
          cargo build --release -p chart-server --target x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/chart-server chart-server-bin

      - name: Validate Docker image build (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: crates/chart-server/Dockerfile
          push: false

  # Trusted publish path: only runs on push to main / tags, never on PRs.
  # packages:write lives here exclusively, where no untrusted PR code executes.
  build-and-push:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-chart-server-${{ hashFiles('**/Cargo.lock') }}

      - name: Build chart-server (static binary)
        run: |
          cargo build --release -p chart-server --target x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/chart-server chart-server-bin

      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=match,pattern=chart-server-v(.+),group=1,prefix=v,enable=${{ startsWith(github.ref, 'refs/tags/chart-server-v') }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: crates/chart-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
