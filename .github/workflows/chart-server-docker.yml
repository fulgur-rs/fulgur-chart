name: chart-server Docker

on:
  push:
    branches: [main]
    tags: ['chart-server-v*']
  pull_request:
    paths:
      - 'crates/chart-server/**'
      - 'crates/fulgur-chart/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/chart-server-docker.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: fulgur-rs/chart-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-chart-server-${{ hashFiles('**/Cargo.lock') }}

      - name: Build chart-server (static binary)
        run: |
          cargo build --release -p chart-server --target x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/chart-server chart-server-bin

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=match,pattern=chart-server-v(.+),group=1,prefix=v,enable=${{ startsWith(github.ref, 'refs/tags/chart-server-v') }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: crates/chart-server/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
